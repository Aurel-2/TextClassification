<!DOCTYPE html>
<html lang="">
<head>
    <title>Sentiment Analysis</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 30px;
        }

        h2 {
            color: #333;
        }

        p {
            margin-top: 15px;
        }

        select, textarea {
            width: 100%;
            max-width: 500px;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border-left: 4px solid #4CAF50;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<h2>Analyse de sentiment</h2>
<p>Sélectionnez un modèle : </p>
<select id="model">
    <option value="naive_bayes">Naive Bayes</option>
    <option value="decision_tree">Decision Tree</option>
    <option value="logistic_regression">Logistic Regression</option>
</select><br>

<p>Entrez un texte à analyser : </p>

<textarea id="text" rows="5" cols="50"></textarea><br><br>
<button onclick="predict()">Prédire</button>

<p id="result"></p>

<script>
function predict() {
    let text = document.getElementById("text").value;
    let model = document.getElementById("model").value;

    fetch("/predict", {method: "POST",headers: {"Content-Type": "application/json"},body: JSON.stringify({text: text, model: model})}).then(res => res.json())
    .then(data => {
        let mots = data.explanation.join(", ");
        document.getElementById("result").innerText =
            "Modèle : " + data.model +
            "\nPrédiction : " + (data.prediction === 1 ? "Positif" : "Négatif") +
            "\nMots importants : " + mots;
    });
}
</script>
</body>
</html>
